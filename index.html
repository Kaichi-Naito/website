<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kaichi（内藤海地）によるギター演奏・オリジナル楽曲を紹介する公式サイト。YouTube・Spotifyで最新楽曲をお楽しみください。">  
    <meta property="og:title" content="Kaichi Guitar Music">
    <meta property="og:description" content="Kaichi（内藤海地）のオリジナル楽曲・ギター演奏動画を公開中。">
    <meta property="og:image" content="https://kaichi-naito.github.io/website/images/Kaichi_profile-image.jpg">
    <meta property="og:url" content="https://kaichi-naito.github.io/website/index.html">
    <meta property="og:type" content="website">
    <meta http-equiv="Cache-Control" content="max-age=31536000">
    <title>Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap; 
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 50px 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden;
            z-index: 1;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.1);
            z-index: -1;
        }

        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            margin: 0; 
            max-width: 95%;
            display: inline-block;
            text-align: left;
            position: absolute;
            
            /* --- 修正：初期状態を透明にし、フェードイン効果を追加 --- */
            opacity: 0; 
            transition: transform 0.2s, opacity 0.4s ease-in;
        }

        .draggable-cursor {
            cursor: grab;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .close-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: black;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .close-button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding-top: 1px;
            padding-left: 1px;
        }

        .window-contents {
            padding: 15px;
            border: 1px solid #808080;
            background-color: #c0c0c0;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 12px;
            color: black !important;
            text-decoration: none !important;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 7px 11px 5px 13px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white !important;
            width: 80px;
            cursor: pointer;
        }

        .desktop-icon img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            image-rendering: pixelated;
            margin-bottom: 5px;
        }

        .desktop-icon span {
            font-size: 14px;
            text-align: center;
            padding: 2px 4px;
            border: 1px dotted transparent;
            text-shadow: 1px 1px 0 #000;
        }

        .desktop-icon:hover span, .desktop-icon:active span {
            background-color: #000080;
            color: white;
            border: 1px dotted #fff;
        }

        .header-title {
            color: white;
            text-shadow: 2px 2px #000;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .profile-img {
            width: 120px;
            height: auto;
            border: 2px solid #808080;
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }

            width: 4
