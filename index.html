<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kaichi（内藤海地）によるギター演奏・オリジナル楽曲を紹介する公式サイト。YouTube・Spotifyで最新楽曲をお楽しみください。">  
    <meta property="og:title" content="Kaichi Guitar Music">
    <meta property="og:description" content="Kaichi（内藤海地）のオリジナル楽曲・ギター演奏動画を公開中。">
    <meta property="og:image" content="https://kaichi-naito.github.io/website/images/Kaichi_profile-image.jpg">
    <meta property="og:url" content="https://kaichi-naito.github.io/website/index.html">
    <meta property="og:type" content="website">
    <meta http-equiv="Cache-Control" content="max-age=31536000">
    <title>Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap; 
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 50px 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden;
            z-index: 1;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.1); 
            z-index: -1;
        }

        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            margin: 0; 
            max-width: 95vw; /* PCでも画面外にはみ出しすぎないように */
            display: inline-block;
            text-align: left;
            position: absolute;
            
            opacity: 0; 
            transition: transform 0.2s, opacity 0.4s ease-in;
        }

        .draggable-cursor {
            cursor: grab;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .close-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: black;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .close-button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding-top: 1px;
            padding-left: 1px;
        }

        .window-contents {
            padding: 15px;
            border: 1px solid #808080;
            background-color: #c0c0c0;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 12px;
            color: black !important;
            text-decoration: none !important;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 7px 11px 5px 13px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white !important;
            width: 80px;
            cursor: pointer;
        }

        .desktop-icon img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            image-rendering: pixelated;
            margin-bottom: 5px;
        }

        .desktop-icon span {
            font-size: 14px;
            text-align: center;
            padding: 2px 4px;
            border: 1px dotted transparent;
            text-shadow: 1px 1px 0 #000;
        }

        .desktop-icon:hover span, .desktop-icon:active span {
            background-color: #000080;
            color: white;
            border: 1px dotted #fff;
        }

        .header-title {
            color: white;
            text-shadow: 2px 2px #000;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .profile-img {
            width: 120px;
            height: auto;
            border: 2px solid #808080;
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        .social-item img {
            width: 40px;
            height: 40px;
            display: block;
            margin: 0 auto 5px;
        }

        iframe {
            border: 2px solid #808080;
            background: #000;
            display: block;
        }

        .footer {
            margin-top: 50px;
            color: white;
            font-size: 12px;
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-shadow: 1px 1px 2px #000; 
        }

        .window-contents a.phalux-link:hover img {
            border-color: #000080; 
        }

        /* --- スマホ対応（横幅バグ修正版） --- */
        @media (max-width: 800px) {
            body {
                font-size: 14px;
            }
            .header-title { 
                font-size: 1.6em;
                margin-bottom: 15px;
            }
            
            /* 横幅の強制引き伸ばしを削除し、画面より大きくならないガードだけ残す */
            .window {
                max-width: 94vw !important; 
                box-sizing: border-box;
            }

            /* PHALUX用の中身調整（横幅強制を削除） */
            #win-phalux .window-contents {
                padding: 5px !important; 
            }
            #win-phalux .window-contents img {
                max-width: 100px !important; 
            }

            .title-bar {
                font-size: 12px;
                padding: 2px 4px 2px 6px;
            }
            .close-button {
                width: 14px;
                height: 12px;
                font-size: 9px;
            }

            .window-contents {
                padding: 8px; 
            }
            .profile-section {
                flex-direction: column;
                text-align: center;
                gap: 8px; 
            }
            .profile-text h2 {
                font-size: 1.2em;
                margin: 0 0 4px 0 !important;
            }
            .profile-text p {
                font-size: 0.9em;
                margin: 0 0 8px 0 !important;
            }
            .profile-text a {
                font-size: 12px !important; 
            }

            .profile-img {
                width: 84px !important; 
            }
            
            .social-icons-grid {
                gap: 4px !important;
            }
            .social-item {
                padding: 3px 6px !important;
                font-size: 12px !important; 
            }
            .social-item img {
                width: 28px !important; 
                height: 28px !important;
                margin-bottom: 2px !important;
            }
            
            .nav {
                gap: 8px;
                margin-bottom: 25px;
            }
            .desktop-icon {
                width: 60px;
            }
            .desktop-icon img {
                width: 34px !important; 
                height: 34px !important;
            }
            .desktop-icon span {
                font-size: 11px; 
                padding: 1px 2px;
            }
        }
    </style>
</head>
<body id="win95-desktop">
    <script src="//accaii.com/kaichi/script.js" async></script>

    <h1 class="header-title">Kaichi Guitar Music</h1>

    <div class="nav">
        <a href="index.html" class="desktop-icon">
            <img src="images/gif/Computer.gif" alt="Home">
            <span>Home</span>
        </a>
        <a href="Discography.html" class="desktop-icon">
            <img src="images/gif/Disc.gif" alt="Discography">
            <span>Discography</span>
        </a>
        <a href="https://www.youtube.com/playlist?list=PLaOBQu1YWaALTPxFLYkV7YeZQMcRz8wqo" target="_blank" class="desktop-icon">
            <img src="images/gif/Earth.gif" alt="Works">
            <span>Works</span>
        </a>
        <a href="Contact.html" class="desktop-icon">
            <img src="images/gif/window.gif" alt="Contact">
            <span>Contact</span>
        </a>
        <a href="freebgm.html" class="desktop-icon">
            <img src="images/gif/Sound.gif" alt="FREEBGM">
            <span>FREEBGM</span>
        </a>
    </div>

    <div class="window" id="win-profile" style="width: 380px; z-index: 104;">
        <div class="title-bar draggable-cursor" id="handle-profile">
            <span>Profile.exe</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents profile-section">
            <img src="images/Kaichi_profile-image.jpg" alt="Kaichi" class="profile-img">
            <div class="profile-text">
                <h2 style="margin:0 0 10px 0;">Kaichi</h2>
                <p style="margin:0 0 15px 0;">Guitar, write music.</p>
                <a href="https://www.hotoneaudio.com/artists/Kaichi%20Naito" target="_blank" style="font-size: 14px; color: blue;">Hotone Official Artist</a>
            </div>
        </div>
    </div>

    <div class="window" id="win-phalux" style="width: 175px; z-index: 105;"> 
        <div class="title-bar draggable-cursor" id="handle-phalux">
            <span>PHALUX.band</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents" style="text-align: center; padding: 10px;"> 
            <a href="https://phalux.bitfan.id/" target="_blank" class="phalux-link"> 
                <img src="images/PHALUX_logo.png" alt="PHALUX" style="width: 100%; max-width: 150px; height: auto; border: 2px solid #808080; display: block; margin: 0 auto;"> 
            </a>
        </div>
    </div>

    <div class="window" id="win-social" style="width: 450px; z-index: 103;">
        <div class="title-bar draggable-cursor" id="handle-social">
            <span>Social_Media.lnk</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents">
            <div class="social-icons-grid">
                <a href="https://x.com/Kaichi_zZ" target="_blank" class="win95-btn social-item"><img src="images/X_dot_logo.png">X</a>
                <a href="https://www.instagram.com/kaichi_zz/" target="_blank" class="win95-btn social-item"><img src="images/instagram_dot_logo.png">Insta</a>
                <a href="https://www.youtube.com/KaichizZ" target="_blank" class="win95-btn social-item"><img src="images/Youtube_dot_logo.png">YouTube</a>
                <a href="https://www.tiktok.com/@kaichi_zz" target="_blank" class="win95-btn social-item"><img src="images/Tiktok_icon.png">TikTok</a>
                <a href="https://open.spotify.com/artist/0zok75wIWAb9qQ0hofCT1h?si=QrD4CGKXSyGttC7-3nM-XA" target="_blank" class="win95-btn social-item"><img src="images/spotify-icon.png">Spotify</a>
                <a href="https://music.apple.com/jp/artist/kaichi-naito/1542151566" target="_blank" class="win95-btn social-item"><img src="images/applemusic_dot_logo.png">Music</a>
            </div>

    <div class="window" id="win-spotify" style="width: 600px; z-index: 102;">
        <div class="title-bar draggable-cursor" id="handle-spotify">
            <span>CD_Player.exe</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents">
            <iframe src="https://open.spotify.com/embed/album/414HJT5311vIKZHsxh56S2?utm_source=generator" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <div class="window" id="win-youtube" style="width: 800px; z-index: 101;">
        <div class="title-bar draggable-cursor" id="handle-youtube">
            <span>Media_Player.avi</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents">
            <h3 style="margin-top:0;">Original songs🎸</h3>
            <div style="position:relative; padding-top: 56.25%;">
                <iframe src="https://www.youtube.com/embed/videoseries?list=PLaOBQu1YWaAJwvtVQX4xxTIkby7Bj1YF2" 
                        style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <div class="footer">
        このサイトは本人によって頑張って作成されました
    </div>

    <script>
        var mouseClickSound = new Audio('Sound/MouseClick.mp3');
        
        function playClickSound() {
            mouseClickSound.currentTime = 0; 
            mouseClickSound.play().catch(function(e) { /* ignore */ });
        }

        var clickTargets = document.querySelectorAll('.desktop-icon, .win95-btn, .close-button, .title-bar, .phalux-link');
        clickTargets.forEach(function(target) {
            target.addEventListener('mousedown', playClickSound);
            target.addEventListener('touchstart', playClickSound, { passive: true });
        });

        var highestZIndex = 110;

        function setInitialPositions() {
            var width = window.innerWidth;
            var isMobile = window.matchMedia("(max-width: 800px)").matches;

            var profile = document.getElementById('win-profile');
            var phalux = document.getElementById('win-phalux');
            var social = document.getElementById('win-social');
            var spotify = document.getElementById('win-spotify');
            var youtube = document.getElementById('win-youtube');

            var maxBottom = 0;

            if (isMobile) {
                var currentTop = 180; 
                var gap = 12;

                // 左端から少しだけずらして散らす（はみ出さないように計算済み）
                if(profile.style.display !== 'none') {
                    profile.style.left = '3%';
                    profile.style.top = currentTop + 'px';
                    currentTop += profile.offsetHeight + gap;
                }
                if(phalux.style.display !== 'none') {
                    phalux.style.left = '15%'; 
                    phalux.style.top = currentTop + 'px';
                    currentTop += phalux.offsetHeight + gap;
                }
                if(social.style.display !== 'none') {
                    social.style.left = '4%';
                    social.style.top = currentTop + 'px';
                    currentTop += social.offsetHeight + gap;
                }
                if(spotify.style.display !== 'none') {
                    spotify.style.left = '2%';
                    spotify.style.top = currentTop + 'px';
                    currentTop += spotify.offsetHeight + gap;
                }
                if(youtube.style.display !== 'none') {
                    youtube.style.left = '3%';
                    youtube.style.top = currentTop + 'px';
                    maxBottom = currentTop + youtube.offsetHeight + 100;
                } else {
                    maxBottom = currentTop + 100;
                }
            } else {
                if(profile.style.display !== 'none') {
                    profile.style.left = width * 0.15 + 'px';
                    profile.style.top = '200px';
                }
                if(social.style.display !== 'none') {
                    social.style.left = width * 0.55 + 'px';
                    social.style.top = '250px';
                }
                if(phalux.style.display !== 'none') {
                    phalux.style.left = width * 0.60 + 'px'; 
                    var phaluxTop = 250 + (social.offsetHeight || 150) + 40; 
                    phalux.style.top = phaluxTop + 'px';
                }
                if(spotify.style.display !== 'none') {
                    spotify.style.left = width * 0.20 + 'px';
                    spotify.style.top = (200 + (profile.offsetHeight || 150) + 40) + 'px';
                }
                if(youtube.style.display !== 'none') {
                    youtube.style.left = width * 0.10 + 'px';
                    var ytTop = 200 + (profile.offsetHeight || 150) + (spotify.offsetHeight || 200) + 80;
                    youtube.style.top = ytTop + 'px';
                    maxBottom = parseInt(youtube.style.top) + youtube.offsetHeight + 150;
                }
            }

            if(maxBottom > 0) document.body.style.minHeight = maxBottom + 'px';

            setTimeout(function() {
                var allWindows = document.querySelectorAll('.window');
                allWindows.forEach(function(win) {
                    win.style.opacity = '1';
                });
            }, 50);
        }

        window.onload = function() { setTimeout(setInitialPositions, 100); };
        window.onresize = function() { setTimeout(setInitialPositions, 100); };

        function initDrag(targetId, handleId) {
            var target = document.getElementById(targetId);
            var handle = document.getElementById(handleId);
            var isDragging = false;
            var initialX, initialY, offsetX, offsetY;

            handle.addEventListener('mousedown', startDragging);
            handle.addEventListener('touchstart', startDragging, { passive: false });

            function startDragging(e) {
                if(e.target.classList.contains('close-button')) return;

                isDragging = true;
                highestZIndex++;
                target.style.zIndex = highestZIndex;

                if (e.type === 'touchstart') {
                    initialX = e.touches[0].clientX - target.offsetLeft;
                    initialY = e.touches[0].clientY - target.offsetTop;
                    e.preventDefault(); 
                } else {
                    initialX = e.clientX - target.offsetLeft;
                    initialY = e.clientY - target.offsetTop;
                }

                document.addEventListener('mousemove', dragging);
                document.addEventListener('touchmove', dragging, { passive: false });
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
            }

            function dragging(e) {
                if (!isDragging) return;
                if (e.type === 'touchmove') {
                    offsetX = e.touches[0].clientX - initialX;
                    offsetY = e.touches[0].clientY - initialY;
                    e.preventDefault(); 
                } else {
                    offsetX = e.clientX - initialX;
                    offsetY = e.clientY - initialY;
                }
                target.style.left = offsetX + 'px';
                target.style.top = offsetY + 'px';
            }

            function endDrag() {
                isDragging = false;
                document.removeEventListener('mousemove', dragging);
                document.removeEventListener('touchmove', dragging);
                document.removeEventListener('mouseup', endDrag);
                document.removeEventListener('touchend', endDrag);
            }
        }

        initDrag('win-profile', 'handle-profile');
        initDrag('win-phalux', 'handle-phalux'); 
        initDrag('win-social', 'handle-social');
        initDrag('win-spotify', 'handle-spotify');
        initDrag('win-youtube', 'handle-youtube');

        document.querySelectorAll('.close-button').forEach(function(btn) {
            btn.addEventListener('mousedown', function(e) { e.stopPropagation(); });
            btn.addEventListener('touchstart', function(e) { e.stopPropagation(); }, { passive: false });
            
            var closeAction = function(e) {
                e.preventDefault();
                var windowElem = this.closest('.window');
                
                windowElem.style.opacity = '0';
                setTimeout(function() {
                    windowElem.style.display = 'none';
                    // せり上がってくるバグの原因だった setInitialPositions() を削除しました！
                }, 300);
            };
            btn.addEventListener('click', closeAction);
            btn.addEventListener('touchend', closeAction);
        });

    </script>
</body>
</html>
