<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kaichi（内藤海地）によるギター演奏・オリジナル楽曲を紹介する公式サイト。YouTube・Spotifyで最新楽曲をお楽しみください。">  
    <meta property="og:title" content="Kaichi Guitar Music">
    <meta property="og:description" content="Kaichi（内藤海地）のオリジナル楽曲・ギター演奏動画を公開中。">
    <meta property="og:image" content="https://kaichi-naito.github.io/website/images/Kaichi_profile-image.jpg">
    <meta property="og:url" content="https://kaichi-naito.github.io/website/index.html">
    <meta property="og:type" content="website">
    <meta http-equiv="Cache-Control" content="max-age=31536000">
    <title>Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 50px 0;
            background-color: #008080; /* Windows 95 Desktop Color */
            background-image: url('images/8bit_star.png');
            background-blend-mode: overlay;
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden; /* 横スクロールを防止 */
            z-index: 1;
            position: relative;
        }

        /* --- Windows 95 UI Component --- */
        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            margin: 0; 
            max-width: 95%;
            display: inline-block;
            text-align: left;
            position: absolute; /* 全デバイスでドラッグのために絶対配置 */
            transition: transform 0.2s;
        }

        .draggable-cursor {
            cursor: grab;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .close-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: black;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        .window-contents {
            padding: 15px;
            border: 1px solid #808080;
            background-color: #c0c0c0;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 12px;
            color: black !important;
            text-decoration: none !important;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 7px 11px 5px 13px;
        }

        .header-title {
            color: white;
            text-shadow: 2px 2px #000;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .profile-img {
            width: 120px;
            height: auto;
            border: 2px solid #808080;
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; /* PCでのデフォルト */
            text-align: center;
        }
        .social-item img {
            width: 40px;
            height: 40px;
            display: block;
            margin: 0 auto 5px;
        }

        iframe {
            border: 2px solid #808080;
            background: #000;
            display: block;
        }

        .footer {
            margin-top: 50px;
            color: white;
            font-size: 12px;
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        /* スマホ対応 */
        @media (max-width: 600px) {
            .profile-section {
                flex-direction: column;
                text-align: center;
            }
            .header-title { font-size: 1.8em; }
            .window {
                width: 86% !important; /* スマホでも横幅を確保しつつabsoluteを維持 */
                box-sizing: border-box;
            }

            /* --- 画像系を80%に縮小 --- */
            .profile-img {
                width: 96px !important;
            }
            .social-item img {
                width: 32px !important;
                height: 32px !important;
            }

            /* --- 新規追加：SNSボタン同士の間隔とボタン自体を狭める --- */
            .social-icons-grid {
                gap: 5px !important; /* 間隔を狭める */
            }
            .social-item {
                padding: 4px 8px !important; /* ボタン自体を狭める */
                font-size: 14px !important; /* 文字も少し小さく */
            }
            .social-item img {
                margin-bottom: 2px !important; /* アイコン下のマージンを詰める */
            }
        }
    </style>
</head>
<body id="win95-desktop">
    <script src="//accaii.com/kaichi/script.js" async></script>

    <h1 class="header-title">Kaichi Guitar Music</h1>

    <div class="nav">
        <a href="index.html" class="win95-btn">Home</a>
        <a href="Discography.html" class="win95-btn">Discography</a>
        <a href="https://www.youtube.com/playlist?list=PLaOBQu1YWaALTPxFLYkV7YeZQMcRz8wqo" target="_blank" class="win95-btn">Works</a>
        <a href="Contact.html" class="win95-btn">Contact</a>
        <a href="freebgm.html" class="win95-btn">FREEBGM</a>
    </div>

    <div class="window" id="win-profile" style="width: 500px; z-index: 104;">
        <div class="title-bar draggable-cursor" id="handle-profile">
            <span>Profile.exe</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents profile-section">
            <img src="images/Kaichi_profile-image.jpg" alt="Kaichi" class="profile-img">
            <div class="profile-text">
                <h2 style="margin:0 0 10px 0;">Kaichi</h2>
                <p style="margin:0 0 15px 0;">Guitar, write music.</p>
                <a href="https://www.hotoneaudio.com/artists/Kaichi%20Naito" target="_blank" style="font-size: 14px; color: blue;">Hotone Official Artist</a>
            </div>
        </div>
    </div>

    <div class="window" id="win-social" style="width: 450px; z-index: 103;">
        <div class="title-bar draggable-cursor" id="handle-social">
            <span>Social_Media.lnk</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents">
            <div class="social-icons-grid">
                <a href="https://x.com/Kaichi_zZ" target="_blank" class="win95-btn social-item"><img src="images/X_dot_logo.png">X</a>
                <a href="https://www.instagram.com/kaichi_zz/" target="_blank" class="win95-btn social-item"><img src="images/instagram_dot_logo.png">Insta</a>
                <a href="https://www.youtube.com/KaichizZ" target="_blank" class="win95-btn social-item"><img src="images/Youtube_dot_logo.png">YouTube</a>
                <a href="https://www.tiktok.com/@kaichi_zz" target="_blank" class="win95-btn social-item"><img src="images/Tiktok_icon.png">TikTok</a>
                <a href="https://open.spotify.com/artist/0zok75wIWAb9qQ0hofCT1h?si=QrD4CGKXSyGttC7-3nM-XA" target="_blank" class="win95-btn social-item"><img src="images/spotify-icon.png">Spotify</a>
                <a href="https://music.apple.com/jp/artist/kaichi-naito/1542151566" target="_blank" class="win95-btn social-item"><img src="images/applemusic_dot_logo.png">Music</a>
            </div>
        </div>
    </div>

    <div class="window" id="win-spotify" style="width: 600px; z-index: 102;">
        <div class="title-bar draggable-cursor" id="handle-spotify">
            <span>CD_Player.exe</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents">
            <iframe src="https://open.spotify.com/embed/album/414HJT5311vIKZHsxh56S2?utm_source=generator" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <div class="window" id="win-youtube" style="width: 800px; z-index: 101;">
        <div class="title-bar draggable-cursor" id="handle-youtube">
            <span>Media_Player.avi</span>
            <div class="close-button">×</div>
        </div>
        <div class="window-contents">
            <h3 style="margin-top:0;">Original songs🎸</h3>
            <div style="position:relative; padding-top: 56.25%;">
                <iframe src="https://www.youtube.com/embed/videoseries?list=PLaOBQu1YWaAJwvtVQX4xxTIkby7Bj1YF2" 
                        style="position:absolute; top:0; left:0; width:100%; height:100%;" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div class="footer">
        このサイトは本人によって頑張って作成されました(Win95 Edition)
    </div>

    <script>
        var highestZIndex = 110;

        function setInitialPositions() {
            var width = window.innerWidth;
            var isMobile = window.matchMedia("(max-width: 600px)").matches;

            var profile = document.getElementById('win-profile');
            var social = document.getElementById('win-social');
            var spotify = document.getElementById('win-spotify');
            var youtube = document.getElementById('win-youtube');

            var maxBottom = 0;

            if (isMobile) {
                // スマホ用：縦に並べつつ、左右にジグザグに散らす
                var currentTop = 180;
                var gap = 15; // 乱雑感を出すために少し間隔を詰める

                profile.style.left = '3%'; // 左寄り
                profile.style.top = currentTop + 'px';
                currentTop += profile.offsetHeight + gap;

                social.style.left = '11%'; // 右寄り
                social.style.top = currentTop + 'px';
                currentTop += social.offsetHeight + gap;

                spotify.style.left = '4%'; // 左寄り
                spotify.style.top = currentTop + 'px';
                currentTop += spotify.offsetHeight + gap;

                youtube.style.left = '9%'; // 右寄り
                youtube.style.top = currentTop + 'px';
                
                maxBottom = currentTop + youtube.offsetHeight + 100;
            } else {
                // PC用：少し散らして配置
                profile.style.left = width * 0.15 + 'px';
                profile.style.top = '150px';

                social.style.left = width * 0.55 + 'px';
                social.style.top = '200px';

                spotify.style.left = width * 0.20 + 'px';
                spotify.style.top = (150 + profile.offsetHeight + 40) + 'px';

                youtube.style.left = width * 0.10 + 'px';
                youtube.style.top = (150 + profile.offsetHeight + spotify.offsetHeight + 80) + 'px';

                maxBottom = parseInt(youtube.style.top) + youtube.offsetHeight + 150;
            }

            document.body.style.minHeight = maxBottom + 'px';
        }

        window.onload = function() {
            setTimeout(setInitialPositions, 100);
        };
        
        window.onresize = function() {
            setTimeout(setInitialPositions, 100);
        };

        function initDrag(targetId, handleId) {
            var target = document.getElementById(targetId);
            var handle = document.getElementById(handleId);
            var isDragging = false;
            var initialX, initialY;
            var offsetX, offsetY;

            handle.addEventListener('mousedown', startDragging);
            handle.addEventListener('touchstart', startDragging, { passive: false });

            function startDragging(e) {
                isDragging = true;
                highestZIndex++;
                target.style.zIndex = highestZIndex;

                if (e.type === 'touchstart') {
                    initialX = e.touches[0].clientX - target.offsetLeft;
                    initialY = e.touches[0].clientY - target.offsetTop;
                    e.preventDefault(); 
                } else {
                    initialX = e.clientX - target.offsetLeft;
                    initialY = e.clientY - target.offsetTop;
                }

                document.addEventListener('mousemove', dragging);
                document.addEventListener('touchmove', dragging, { passive: false });
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
            }

            function dragging(e) {
                if (!isDragging) return;

                if (e.type === 'touchmove') {
                    offsetX = e.touches[0].clientX - initialX;
                    offsetY = e.touches[0].clientY - initialY;
                    e.preventDefault(); 
                } else {
                    offsetX = e.clientX - initialX;
                    offsetY = e.clientY - initialY;
                }

                target.style.left = offsetX + 'px';
                target.style.top = offsetY + 'px';
            }

            function endDrag() {
                isDragging = false;
                document.removeEventListener('mousemove', dragging);
                document.removeEventListener('touchmove', dragging);
                document.removeEventListener('mouseup', endDrag);
                document.removeEventListener('touchend', endDrag);
            }
        }

        initDrag('win-profile', 'handle-profile');
        initDrag('win-social', 'handle-social');
        initDrag('win-spotify', 'handle-spotify');
        initDrag('win-youtube', 'handle-youtube');
    </script>
</body>
</html>
