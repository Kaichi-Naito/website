<head>

    <style>
        /* --- index.html と完全に同一のベースCSS --- */
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap; 
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 50px 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden;
            z-index: 1;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.1); 
            z-index: -1;
        }

        /* アニメーションで安全に表示させる（JSエラーでも必ず表示される） */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            margin: 0; 
            max-width: 95vw;
            display: inline-block;
            text-align: left;
            position: absolute;
            animation: fadeIn 0.4s ease-in forwards; /* フワッと表示 */
            transition: transform 0.2s;
        }

        .draggable-cursor {
            cursor: grab;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .close-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: black;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .close-button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding-top: 1px;
            padding-left: 1px;
        }

        .window-contents {
            padding: 15px;
            border: 1px solid #808080;
            background-color: #c0c0c0;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 12px;
            color: black !important;
            text-decoration: none !important;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 7px 11px 5px 13px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white !important;
            width: 80px;
            cursor: pointer;
        }

        .desktop-icon img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            image-rendering: pixelated;
            margin-bottom: 5px;
        }

        .desktop-icon span {
            font-size: 14px;
            text-align: center;
            padding: 2px 4px;
            border: 1px dotted transparent;
            text-shadow: 1px 1px 0 #000;
        }

        .desktop-icon:hover span, .desktop-icon:active span {
            background-color: #000080;
            color: white;
            border: 1px dotted #fff;
        }

        .header-title {
            color: white;
            text-shadow: 2px 2px #000;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .profile-img {
            width: 120px;
            height: auto;
            border: none; /* 枠線を消す */
        }

        .social-icons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        .social-item img {
            width: 40px;
            height: 40px;
            display: block;
            margin: 0 auto 5px;
        }

        iframe {
            border: 2px solid #808080;
            background: #000;
            display: block;
        }

        .footer {
            margin-top: 50px;
            color: white;
            font-size: 12px;
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-shadow: 1px 1px 2px #000; 
        }

        .window-contents a.phalux-link:hover img {
            border-color: #000080; 
        }

        @media (max-width: 800px) {
            body {
                font-size: 14px;
            }
            .header-title { 
                font-size: 1.6em;
                margin-bottom: 15px;
            }
            
            .window {
                box-sizing: border-box;
            }

            #win-profile { width: 200px !important; }
            #win-phalux { width: 45% !important; max-width: 160px !important; }
            #win-social { width: 90% !important; max-width: 350px !important; }
            #win-spotify { width: 92% !important; max-width: 360px !important; }
            #win-youtube { width: 96% !important; max-width: 380px !important; }

            #win-phalux .window-contents {
                padding: 5px !important; 
            }
            #win-phalux .window-contents img {
                max-width: 100px !important; 
            }

            .title-bar {
                font-size: 12px;
                padding: 2px 4px 2px 6px;
            }
            .close-button {
                width: 14px;
                height: 12px;
                font-size: 9px;
            }

            .window-contents {
                padding: 8px; 
            }
            .profile-section {
                flex-direction: column;
                text-align: center;
                gap: 8px; 
            }
            .profile-text h2 {
                font-size: 1.2em;
                margin: 0 0 4px 0 !important;
            }
            .profile-text p {
                font-size: 0.9em;
                margin: 0 0 8px 0 !important;
            }
            .profile-text a {
                font-size: 12px !important; 
            }

            .profile-img {
                width: 84px !important; 
            }
            
            .social-icons-grid {
                gap: 4px !important;
            }
            .social-item {
                padding: 3px 6px !important;
                font-size: 12px !important; 
            }
            .social-item img {
                width: 28px !important; 
                height: 28px !important;
                margin-bottom: 2px !important;
            }
            
            .nav {
                gap: 8px;
                margin-bottom: 25px;
            }
            .desktop-icon {
                width: 60px;
            }
            .desktop-icon img {
                width: 34px !important; 
                height: 34px !important;
            }
            .desktop-icon span {
                font-size: 11px; 
                padding: 1px 2px;
            }
        }
    </style>
</head>
<body id="win95-desktop">

    <script>
        var mouseClickSound;

        try {
            mouseClickSound = new Audio('Sound/MouseClick.mp3');
            mouseClickSound.preload = 'auto'; // 追加：事前に読み込んで準備しておく
            mouseClickSound.load();           // 追加：強制的にロードを開始させる
        } catch(e) {
            console.log("Audio load skipped");
        }
        
        function playClickSound() {
            if (mouseClickSound) {
                mouseClickSound.currentTime = 0; 
                mouseClickSound.play().catch(function(e) {});
            }
        }

        var clickTargets = document.querySelectorAll('.desktop-icon, .win95-btn, .close-button, .title-bar, .phalux-link');
        for (var i = 0; i < clickTargets.length; i++) {
            clickTargets[i].addEventListener('mousedown', playClickSound);
            clickTargets[i].addEventListener('touchstart', playClickSound, { passive: true });
        }

        var highestZIndex = 110;

        function setInitialPositions() {
            var width = window.innerWidth;
            var isMobile = window.matchMedia("(max-width: 800px)").matches;

            var profile = document.getElementById('win-profile');
            var phalux = document.getElementById('win-phalux');
            var social = document.getElementById('win-social');
            var spotify = document.getElementById('win-spotify');
            var youtube = document.getElementById('win-youtube');

            var maxBottom = 0;
  // ↓↓↓ ここから下がスマホ版の配置指定です ↓↓↓
            if (isMobile) {
                if(profile.style.display !== 'none') {
                    profile.style.left = '4%';
                    profile.style.top = '150px';
                }
                if(phalux.style.display !== 'none') {
                    phalux.style.left = '52%'; 
                    phalux.style.top = '250px';
                }
                if(social.style.display !== 'none') {
                    social.style.left = '15%';
                    social.style.top = '420px';
                }
                
                if(spotify.style.display !== 'none') {
                    var spWidth = spotify.offsetWidth || 320;
                    spotify.style.left = (width - spWidth - 22) + 'px'; 
                    spotify.style.top = '620px';
                }

                if(youtube.style.display !== 'none') {
                    youtube.style.left = '2%';
                    youtube.style.top = '730px';
                    maxBottom = 730 + (youtube.offsetHeight || 400) + 100;
                } else {
                    maxBottom = 900;
                }
            } else {
             // ↓↓↓ ここから下がPC版の配置指定です ↓↓↓
                if(profile.style.display !== 'none') {
                    profile.style.left = '28%';
                    profile.style.top = '200px';
                }
                if(phalux.style.display !== 'none') {
                    phalux.style.left = '75%'; 
                    phalux.style.top = '170px';
                }
                if(social.style.display !== 'none') {
                    social.style.left = '57%'; 
                    social.style.top = '350px';
                }
                if(spotify.style.display !== 'none') {
                    spotify.style.left = '15%'; 
                    spotify.style.top = '450px';
                }
                if(youtube.style.display !== 'none') {
                    youtube.style.left = '40%'; 
                    youtube.style.top = '700px';
                    maxBottom = 650 + (youtube.offsetHeight || 450) + 150;
                } else {
                    maxBottom = 1000;
                }
            }

            if(maxBottom > 0) document.body.style.minHeight = maxBottom + 'px';
        }

        window.onload = function() { setTimeout(setInitialPositions, 100); };
        window.onresize = function() { setTimeout(setInitialPositions, 100); };

        function initDrag(targetId, handleId) {
            var target = document.getElementById(targetId);
            var handle = document.getElementById(handleId);
            var isDragging = false;
            var initialX, initialY, offsetX, offsetY;

            handle.addEventListener('mousedown', startDragging);
            handle.addEventListener('touchstart', startDragging, { passive: false });

            function startDragging(e) {
                if(e.target.classList.contains('close-button')) return;

                isDragging = true;
                highestZIndex++;
                target.style.zIndex = highestZIndex;

                if (e.type === 'touchstart') {
                    initialX = e.touches[0].clientX - target.offsetLeft;
                    initialY = e.touches[0].clientY - target.offsetTop;
                    e.preventDefault(); 
                } else {
                    initialX = e.clientX - target.offsetLeft;
                    initialY = e.clientY - target.offsetTop;
                }

                document.addEventListener('mousemove', dragging);
                document.addEventListener('touchmove', dragging, { passive: false });
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
            }

            function dragging(e) {
                if (!isDragging) return;
                if (e.type === 'touchmove') {
                    offsetX = e.touches[0].clientX - initialX;
                    offsetY = e.touches[0].clientY - initialY;
                    e.preventDefault(); 
                } else {
                    offsetX = e.clientX - initialX;
                    offsetY = e.clientY - initialY;
                }
                target.style.left = offsetX + 'px';
                target.style.top = offsetY + 'px';
            }

            function endDrag() {
                isDragging = false;
                document.removeEventListener('mousemove', dragging);
                document.removeEventListener('touchmove', dragging);
                document.removeEventListener('mouseup', endDrag);
                document.removeEventListener('touchend', endDrag);
            }
        }

        initDrag('win-profile', 'handle-profile');
        initDrag('win-phalux', 'handle-phalux'); 
        initDrag('win-social', 'handle-social');
        initDrag('win-spotify', 'handle-spotify');
        initDrag('win-youtube', 'handle-youtube');

        var closeBtns = document.querySelectorAll('.close-button');
        for(var j = 0; j < closeBtns.length; j++) {
            closeBtns[j].addEventListener('mousedown', function(e) { e.stopPropagation(); });
            closeBtns[j].addEventListener('touchstart', function(e) { e.stopPropagation(); }, { passive: false });
            
            var closeAction = function(e) {
                e.preventDefault();
                var windowElem = this.closest('.window');
                windowElem.style.display = 'none';
            };
            closeBtns[j].addEventListener('click', closeAction);
            closeBtns[j].addEventListener('touchend', closeAction);
        }

        // --- 飛び回るNyan Catのアニメーションとクリック処理 ---
        var catSound;
        try {
            catSound = new Audio('Sound/CatMeow.mp3');
            catSound.preload = 'auto';
        } catch(e) {}

        var nyanCat = document.getElementById('nyan-cat');
        var catX = window.innerWidth / 2;
        var catY = window.innerHeight / 2;
        var catVx = 3; // 横の移動スピード
        var catVy = 2; // 縦の移動スピード
        var isCatActive = true;

        function animateCat() {
            if (!isCatActive || !nyanCat) return;

            var w = window.innerWidth;
            var h = window.innerHeight;
            var catW = nyanCat.offsetWidth || 80;
            var catH = nyanCat.offsetHeight || 50;

            catX += catVx;
            catY += catVy;

            // 画面の端に当たったら跳ね返る（進行方向に応じて反転させる）
            if (catX + catW > w) { 
                catX = w - catW; 
                catVx *= -1; 
                nyanCat.style.transform = 'scaleX(-1)'; 
            } else if (catX < 0) { 
                catX = 0; 
                catVx *= -1; 
                nyanCat.style.transform = 'scaleX(1)'; 
            }

            if (catY + catH > h) { 
                catY = h - catH; 
                catVy *= -1; 
            } else if (catY < 0) { 
                catY = 0; 
                catVy *= -1; 
            }

            nyanCat.style.left = catX + 'px';
            nyanCat.style.top = catY + 'px';

            requestAnimationFrame(animateCat);
        }
        
        // アニメーションを開始
        requestAnimationFrame(animateCat);

        // タップされた時の処理
        function catchCat(e) {
            e.preventDefault(); // スマホの誤作動防止
            isCatActive = false; // アニメーションを止める
            nyanCat.style.display = 'none'; // 画像を消す
            
            if (catSound) {
                catSound.currentTime = 0;
                catSound.play().catch(function(err){});
            }
        }

        nyanCat.addEventListener('mousedown', catchCat);
        nyanCat.addEventListener('touchstart', catchCat, { passive: false });

    </script>
</body>
