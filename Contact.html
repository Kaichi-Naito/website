<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap;
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 100px 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            overflow: hidden; /* ドラッグ範囲外へのスクロール防止 */
        }

        .site-title {
            font-size: 32px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
            pointer-events: none;
        }

        /* ナビゲーション */
        .nav {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 40px;
        }
        .desktop-icon {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            color: white !important; width: 75px;
        }
        .desktop-icon img { width: 32px; height: 32px; image-rendering: pixelated; margin-bottom: 5px; }
        .desktop-icon span { font-size: 12px; text-shadow: 1px 1px 0 #000; padding: 2px 4px; }
        .desktop-icon:hover span { background-color: #000080; border: 1px dotted #fff; }

        /* ウィンドウ基本設定 */
        .win95-window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            text-align: left;
            position: absolute; /* ドラッグのために絶対配置 */
            cursor: default;
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            cursor: move; /* 掴める合図 */
            user-select: none;
        }
        .close-btn { 
            font-size: 10px; cursor: pointer; border: 1px solid #fff; 
            padding: 0 4px; background: #c0c0c0; color: black; 
            box-shadow: 1px 1px 0 #000; line-height: 12px;
        }
        .close-btn:active { box-shadow: inset 1px 1px 0 #000; padding: 1px 3px -1px 5px; }

        .window-contents { padding: 10px; border: 1px solid #808080; margin: 2px; }

        /* 初期配置 */
        #info-win { width: 300px; top: 180px; left: 10%; z-index: 10; }
        #calc-win { width: 320px; top: 250px; left: 50%; transform: translateX(-50%); z-index: 5; }
        #dm-win { width: 250px; top: 500px; left: 60%; z-index: 8; }

        /* 電卓パーツ */
        .calc-display {
            background-color: #ffffff; border: 2px inset #ffffff;
            padding: 5px 10px; text-align: right; font-size: 24px;
            margin-bottom: 10px; height: 35px; box-shadow: inset 2px 2px 0px #808080;
        }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .win95-btn {
            background-color: #c0c0c0; border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 8px 0; font-family: 'PixelMplus', sans-serif;
            cursor: pointer; text-align: center; font-size: 16px;
        }
        .win95-btn:active { border-color: #808080 #ffffff #ffffff #808080; padding: 9px 0 7px 0; }
        .num-btn { color: #0000ff; }
        .func-btn { color: #ff0000; }
        .ok-btn { grid-column: span 4; color: #ff0000; font-weight: bold; }

        .footer { position: fixed; bottom: 20px; width: 100%; color: white; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
    <script src="//accaii.com/kaichi/script.js" async></script>

    <div class="site-title">Kaichi Guitar Music</div>

    <div class="nav">
        <a href="index.html" class="desktop-icon">
            <img src="images/gif/Computer.gif" alt="Home"><span>Home</span>
        </a>
        <a href="Discography.html" class="desktop-icon">
            <img src="images/gif/Disc.gif" alt="Discography"><span>Discography</span>
        </a>
        <a href="https://www.youtube.com/playlist?list=PLaOBQu1YWaALTPxFLYkV7YeZQMcRz8wqo" target="_blank" class="desktop-icon">
            <img src="images/gif/World.gif" alt="Works"><span>Works</span>
        </a>
        <a href="Contact.html" class="desktop-icon">
            <img src="images/gif/Contact.gif" alt="Contact"><span>Contact</span>
        </a>
        <a href="freebgm.html" class="desktop-icon">
            <img src="images/gif/Sound.gif" alt="FREEBGM"><span>FREEBGM</span>
        </a>
    </div>

    <div class="win95-window draggable" id="info-win">
        <div class="title-bar">
            <span>Message</span>
            <div class="close-btn" onclick="closeWindow('info-win')">×</div>
        </div>
        <div class="window-contents" style="font-size: 13px;">
            以下のテストに答えるとメールアドレスが表示されます。<br>
            <small>Answer the Test below to display the email address.</small>
        </div>
    </div>

    <div class="win95-window draggable" id="calc-win">
        <div class="title-bar">
            <span>Calculator.exe</span>
            <div class="close-btn" onclick="closeWindow('calc-win')">×</div>
        </div>
        <div class="window-contents">
            <div id="question" style="text-align:center; margin-bottom:10px; font-size:16px; background:#eee; padding:5px; border:1px inset #fff;">
                読み込み中…
            </div>
            <div class="calc-display" id="display">0</div>
            <div class="keypad">
                <div class="win95-btn func-btn" onclick="playSound(); clearDisplay()">C</div>
                <div class="win95-btn func-btn" onclick="playSound(); backspace()">Back</div>
                <div class="win95-btn func-btn" style="grid-column: span 2; font-size:12px;">Contact</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(7)">7</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(8)">8</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(9)">9</div>
                <div class="win95-btn func-btn">/</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(4)">4</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(5)">5</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(6)">6</div>
                <div class="win95-btn func-btn">*</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(1)">1</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(2)">2</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(3)">3</div>
                <div class="win95-btn func-btn">-</div>
                <div class="win95-btn num-btn" onclick="playSound(); inputNum(0)">0</div>
                <div class="win95-btn num-btn">+/-</div><div class="win95-btn num-btn">.</div>
                <div class="win95-btn func-btn">+</div>
                <div class="win95-btn ok-btn" onclick="playSound(); checkAnswer()">ENTER (OK)</div>
            </div>
        </div>
    </div>

    <div class="win95-window draggable" id="dm-win">
        <div class="title-bar">
            <span>Social</span>
            <div class="close-btn" onclick="closeWindow('dm-win')">×</div>
        </div>
        <div class="window-contents" style="text-align: center;">
            <a href="https://twitter.com/messages/compose?recipient_id=261132037" target="_blank" onclick="playSound()" style="color: blue; font-size: 14px;">
                X(Twitter)のDMはこちら
            </a>
        </div>
    </div>

    <div class="footer">このサイトは本人によって頑張って作成されました</div>

    <script>
        // サウンド
        const clickSound = new Audio('https://kaichi-naito.github.io/website/sounds/click.mp3'); 
        function playSound() { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); }

        // ウィンドウ操作機能
        let highestZ = 20;

        function closeWindow(id) {
            playSound();
            document.getElementById(id).style.display = 'none';
        }

        document.querySelectorAll('.draggable').forEach(win => {
            const titleBar = win.querySelector('.title-bar');
            
            titleBar.onmousedown = function(e) {
                // 前面に持ってくる
                highestZ++;
                win.style.zIndex = highestZ;

                let shiftX = e.clientX - win.getBoundingClientRect().left;
                let shiftY = e.clientY - win.getBoundingClientRect().top;

                function moveAt(pageX, pageY) {
                    win.style.left = pageX - shiftX + 'px';
                    win.style.top = pageY - shiftY + 'px';
                    win.style.transform = 'none'; // 中央寄せ解除
                }

                function onMouseMove(e) { moveAt(e.pageX, e.pageY); }

                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            // クリックだけでも前面に来るように
            win.onmousedown = function() {
                highestZ++;
                win.style.zIndex = highestZ;
            };

            titleBar.ondragstart = function() { return false; };
        });

        // 電卓ロジック
        const display = document.getElementById('display');
        const questionBox = document.getElementById('question');
        let currentInput = "";
        let wrongCount = 0;
        const MIN = 1, MAX = 20;
        const a = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
        const b = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
        const correct = a + b;
        const encodedEmail = 'a2FpY2hpLm5haXRvQGdtYWlsLmNvbQ==';

        questionBox.textContent = `${a} ＋ ${b} ＝ ？`;

        function inputNum(num) { if (currentInput.length < 8) { currentInput += num; display.textContent = currentInput; } }
        function clearDisplay() { currentInput = ""; display.textContent = "0"; }
        function backspace() { currentInput = currentInput.slice(0, -1); display.textContent = currentInput || "0"; }

        function checkAnswer() {
            const userAns = parseInt(currentInput, 10);
            if (userAns === correct) {
                const email = atob(encodedEmail);
                questionBox.style.color = "blue";
                questionBox.innerHTML = `SUCCESS!<br><span style="background:yellow; padding:0 5px;">${email}</span>`;
                display.textContent = "OK!";
            } else {
                wrongCount++;
                if (wrongCount >= 3) {
                    questionBox.style.color = "red";
                    questionBox.textContent = "LOCKED. REFRESH PAGE.";
                    display.textContent = "ERR";
                    document.querySelectorAll('.win95-btn').forEach(btn => btn.style.pointerEvents = 'none');
                } else {
                    questionBox.style.color = "red";
                    questionBox.textContent = `不正解! 残り${3 - wrongCount}回`;
                    clearDisplay();
                }
            }
        }
    </script>
</body>
</html>
