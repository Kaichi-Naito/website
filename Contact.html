<head>

    <meta property="og:image" content="https://kaichi-naito.github.io/website/images/Kaichi_profile-image.jpg">
    <meta property="og:url" content="https://kaichi-naito.github.io/website/Contact.html">

    <title>Contact - Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        /* --- index.html と完全に同一のベースCSS --- */
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap; 
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 50px 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden;
            z-index: 1;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.1); 
            z-index: -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            margin: 0; 
            max-width: 95vw;
            display: inline-block;
            text-align: left;
            position: absolute;
            animation: fadeIn 0.4s ease-in forwards;
            transition: transform 0.2s;
        }

        .draggable-cursor {
            cursor: grab;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .close-button {
            width: 16px;
            height: 14px;
            background-color: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            color: black;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .close-button:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding-top: 1px;
            padding-left: 1px;
        }

        .window-contents {
            padding: 15px;
            border: 1px solid #808080;
            background-color: #c0c0c0;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 12px;
            color: black !important;
            text-decoration: none !important;
            display: inline-block;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 7px 11px 5px 13px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white !important;
            width: 80px;
            cursor: pointer;
        }

        .desktop-icon img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            image-rendering: pixelated;
            margin-bottom: 5px;
        }

        .desktop-icon span {
            font-size: 14px;
            text-align: center;
            padding: 2px 4px;
            border: 1px dotted transparent;
            text-shadow: 1px 1px 0 #000;
        }

        .desktop-icon:hover span, .desktop-icon:active span {
            background-color: #000080;
            color: white;
            border: 1px dotted #fff;
        }

        .header-title {
            color: white;
            text-shadow: 2px 2px #000;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 50px;
            color: white;
            font-size: 12px;
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-shadow: 1px 1px 2px #000; 
        }

        /* --- コンタクトページ専用の追加CSS（電卓パーツ） --- */
        .calc-display {
            background-color: #ffffff; border: 2px inset #ffffff;
            padding: 5px 10px; text-align: right; font-size: 24px;
            margin-bottom: 10px; height: 35px; box-shadow: inset 2px 2px 0px #808080;
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .win95-calc-btn { /* .win95-btnの余白が干渉しないよう専用クラス化 */
            background-color: #c0c0c0; border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 0; font-family: 'PixelMplus', sans-serif;
            cursor: pointer; text-align: center; font-size: 16px;
            color: black;
        }
        .win95-calc-btn:active { border-color: #808080 #ffffff #ffffff #808080; padding: 7px 0 5px 0; }

        /* --- スマホ用レスポンシブ --- */
        @media (max-width: 800px) {
            body { font-size: 14px; }
            .header-title { font-size: 1.6em; margin-bottom: 15px; }
            .window { box-sizing: border-box; }
            .title-bar { font-size: 12px; padding: 2px 4px 2px 6px; }
            .close-button { width: 14px; height: 12px; font-size: 9px; }
            .window-contents { padding: 8px; }
            .nav { gap: 8px; margin-bottom: 25px; }
            .desktop-icon { width: 60px; }
            .desktop-icon img { width: 34px !important; height: 34px !important; }
            .desktop-icon span { font-size: 11px; padding: 1px 2px; }

            /* 電卓ウィンドウ縮小設定 */
            #win-calculator { width: 200px !important; }
            #win-calculator .win95-calc-btn { font-size: 14px; padding: 4px 0; }
            #win-calculator .calc-display { font-size: 18px; height: 28px; }
        }
    </style>
</head>
