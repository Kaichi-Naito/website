<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap;
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: white; /* ベースを白に */
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* 背景を10%暗くする設定 (index.htmlと完全一致) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.1); 
            z-index: -1;
        }

        /* ヘッダー設定 (index.htmlと完全一致) */
        h1 {
            font-size: 2em;
            margin-bottom: 30px;
            padding-top: 20px;
            text-shadow: 2px 2px #000;
            color: white;
        }

        /* ナビゲーション (index.htmlと完全一致) */
        .nav {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 40px;
        }
        .desktop-icon {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            color: white !important; width: 80px; cursor: pointer;
        }
        .desktop-icon img { width: 48px; height: 48px; object-fit: contain; image-rendering: pixelated; margin-bottom: 5px; }
        .desktop-icon span { font-size: 14px; text-align: center; padding: 2px 4px; border: 1px dotted transparent; text-shadow: 1px 1px 0 #000; }
        .desktop-icon:hover span { background-color: #000080; color: white; border: 1px dotted #fff; }

        /* ウィンドウ設定 (index.htmlと完全一致) */
        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            position: absolute;
            text-align: left;
            display: inline-block;
            color: black; /* ウィンドウ内は黒文字 */
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
            cursor: grab;
        }
        .close-button {
            width: 16px; height: 14px; background-color: #c0c0c0;
            border: 1px solid; border-color: #ffffff #808080 #808080 #ffffff;
            color: black; font-size: 10px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold;
        }

        .window-contents { padding: 15px; border: 1px solid #808080; background-color: #c0c0c0; }

        /* 電卓・ボタン設定 */
        .calc-display {
            background-color: #ffffff; border: 2px inset #ffffff;
            padding: 5px 10px; text-align: right; font-size: 24px;
            margin-bottom: 10px; height: 35px; box-shadow: inset 2px 2px 0px #808080;
        }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .win95-btn {
            background-color: #c0c0c0; border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 0; font-family: 'PixelMplus', sans-serif;
            cursor: pointer; text-align: center; font-size: 16px;
            color: black; text-decoration: none;
        }
        .win95-btn:active { border-color: #808080 #ffffff #ffffff #808080; padding: 7px 0 5px 0; }

        /* フッター */
        .footer {
            margin-top: 50px;
            color: white;
            font-size: 0.8em;
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        /* スマホ版設定 (ここをindex.htmlと完全に合わせました) */
        @media (max-width: 800px) {
            h1 {
                font-size: 1.5em; /* トップページと同じサイズ */
                margin-bottom: 30px;
            }
            .nav {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }
            .desktop-icon { width: 60px; }
            .desktop-icon img { width: 34px; height: 34px; }
            .desktop-icon span { font-size: 11px; }
            .window { max-width: 95vw; }
        }
    </style>
</head>
<body id="win95-desktop">
    <h1>Kaichi Guitar Music</h1>

    <div class="nav">
        <a href="index.html" class="desktop-icon"><img src="images/gif/Computer.gif" alt="Home"><span>Home</span></a>
        <a href="Discography.html" class="desktop-icon"><img src="images/gif/Disc.gif" alt="Discography"><span>Discography</span></a>
        <a href="https://www.youtube.com/playlist?list=PLaOBQu1YWaALTPxFLYkV7YeZQMcRz8wqo" target="_blank" class="desktop-icon"><img src="images/gif/Earth.gif" alt="Works"><span>Works</span></a>
        <a href="Contact.html" class="desktop-icon"><img src="images/gif/window.gif" alt="Contact"><span>Contact</span></a>
        <a href="freebgm.html" class="desktop-icon"><img src="images/gif/Sound.gif" alt="FREEBGM"><span>FREEBGM</span></a>
    </div>

    <div class="window" id="win-message">
        <div class="title-bar" id="handle-message"><span>Message</span><div class="close-button">×</div></div>
        <div class="window-contents">以下のテストに答えるとメールアドレスが表示されます。<br><small>Answer the Test below to display the email address.</small></div>
    </div>

    <div class="window" id="win-calculator">
        <div class="title-bar" id="handle-calculator"><span>Calculator.exe</span><div class="close-button">×</div></div>
        <div class="window-contents">
            <div id="question" style="text-align:center; margin-bottom:10px; font-size:16px; background:#eee; padding:5px; border:1px inset #fff;">読み込み中…</div>
            <div class="calc-display" id="display">0</div>
            <div class="keypad">
                <div class="win95-btn" onclick="inputNum(1)">1</div>
                <div class="win95-btn" onclick="inputNum(2)">2</div>
                <div class="win95-btn" onclick="inputNum(3)">3</div>
                <div class="win95-btn" style="color:red" onclick="checkAnswer()">OK</div>
            </div>
        </div>
    </div>

    <div class="window" id="win-social-dm">
        <div class="title-bar" id="handle-social-dm"><span>Social</span><div class="close-button">×</div></div>
        <div class="window-contents" style="text-align: center;">
            <a href="https://twitter.com/messages/compose?recipient_id=261132037" target="_blank" class="win95-btn" style="color: blue !important; display: block; padding: 5px;">X(Twitter)のDMはこちら</a>
        </div>
    </div>

    <div class="footer">このサイトは本人によって頑張って作成されました</div>

    <script>
        // 前述の initDrag などのスクリプトをここに含めてください
        // setInitialPositions 内の数値を調整して、スマホでの並びを綺麗にできます。
    </script>
</body>
</html>
