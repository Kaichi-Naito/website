<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Kaichi Guitar Music</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('https://kaichi-naito.github.io/website/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-display: swap;
        }
        body {
            font-family: 'PixelMplus', sans-serif;
            color: black;
            text-align: center;
            margin: 0;
            padding: 20px 0 50px 0;
            background-color: #008080;
            background-image: url('images/windows-95-background.jpg'); /* indexと同じ背景 */
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* 共通：ウィンドウの基本スタイル */
        .window {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            box-shadow: 1px 1px 0 0 #000000;
            padding: 2px;
            display: inline-block;
            text-align: left;
            margin: 40px auto;
            max-width: 90vw;
            width: 450px;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 3px 5px 3px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
        }

        .window-contents {
            padding: 20px;
            border: 1px solid #808080;
            background-color: #ffffff; /* 入力画面っぽく白に */
            margin: 2px;
        }

        /* ナビゲーション（デスクトップアイコン風） */
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white !important;
            width: 80px;
        }
        .desktop-icon img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            margin-bottom: 5px;
        }
        .desktop-icon span {
            font-size: 14px;
            text-shadow: 1px 1px 0 #000;
            padding: 2px 4px;
        }
        .desktop-icon:hover span {
            background-color: #000080;
            border: 1px dotted #fff;
        }

        /* 入力フォーム周り */
        input[type="number"] {
            padding: 5px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            font-family: 'PixelMplus', sans-serif;
            width: 100px;
            margin: 10px 0;
        }

        .win95-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 4px 15px;
            font-family: 'PixelMplus', sans-serif;
            cursor: pointer;
        }
        .win95-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 5px 14px 3px 16px;
        }

        .result-area {
            margin-top: 15px;
            font-weight: bold;
            min-height: 1.2em;
        }

        .dm-section {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px dashed #808080;
            text-align: center;
        }

        .footer {
            margin-top: 50px;
            color: white;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
        }

        @media (max-width: 500px) {
            .window { width: 95%; }
            .nav { gap: 10px; }
            .desktop-icon { width: 65px; }
            .desktop-icon img { width: 34px; height: 34px; }
            .desktop-icon span { font-size: 11px; }
        }
    </style>
</head>
<body>
    <script src="//accaii.com/kaichi/script.js" async></script>

    <div class="nav">
        <a href="index.html" class="desktop-icon">
            <img src="images/gif/Computer.gif" alt="Home">
            <span>Home</span>
        </a>
        <a href="Discography.html" class="desktop-icon">
            <img src="images/gif/Disc.gif" alt="Discography">
            <span>Discography</span>
        </a>
        <a href="freebgm.html" class="desktop-icon">
            <img src="images/gif/Sound.gif" alt="FREEBGM">
            <span>FREEBGM</span>
        </a>
    </div>

    <div class="window">
        <div class="title-bar">
            <span>Contact.txt - Notepad</span>
            <div style="font-size: 10px;">? ×</div>
        </div>
        <div class="window-contents">
            <h2 style="margin-top:0; font-size: 20px;">ご連絡先 / Contact</h2>
            <p style="font-size: 14px; line-height: 1.6;">
                スパム防止のため、クイズに答えるとメールアドレスが表示されます。<br>
                Answer the test to see the email.
            </p>
            
            <div style="background:#f0f0f0; padding: 15px; border: 1px inset #808080;">
                <p id="question" style="font-size: 18px; margin: 0;">読み込み中…</p>
                <input type="number" id="answer" placeholder="??">
                <button id="submit" class="win95-btn">送信 (OK)</button>
                <div id="result" class="result-area"></div>
            </div>

            <div class="dm-section">
                <p style="font-size: 14px;">SNSでの連絡はこちら:</p>
                <a href="https://twitter.com/messages/compose?recipient_id=261132037" target="_blank" style="color: blue; text-decoration: underline;">
                    X(Twitter) DM
                </a>
            </div>
        </div>
    </div>

    <div class="footer">
        このサイトは本人によって頑張って作成されました
    </div>

    <script>
        (function(){
            const MIN = 1, MAX = 20;
            const a = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
            const b = Math.floor(Math.random() * (MAX - MIN + 1)) + MIN;
            const correct = a + b;
            const encodedEmail = 'a2FpY2hpLm5haXRvQGdtYWlsLmNvbQ==';
            let wrongCount = 0;

            document.getElementById('question').textContent = `${a} ＋ ${b} ＝ ？`;

            const submitBtn = document.getElementById('submit');
            const answerInput = document.getElementById('answer');
            const resultEl = document.getElementById('result');

            function check() {
                const userAns = parseInt(answerInput.value, 10);
                if (userAns === correct) {
                    const email = atob(encodedEmail);
                    resultEl.innerHTML = '<span style="color: green; font-size: 18px;">Email: ' + email + '</span>';
                    resultEl.style.color = "green";
                } else {
                    wrongCount++;
                    if (wrongCount >= 3) {
                        resultEl.textContent = 'Too many attempts.';
                        submitBtn.disabled = true;
                        answerInput.disabled = true;
                    } else {
                        resultEl.textContent = `不正解! 残り${3 - wrongCount}回`;
                        resultEl.style.color = "red";
                    }
                }
            }

            submitBtn.addEventListener('click', check);
            answerInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') check();
            });
        })();
    </script>
</body>
</html>
